<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDC Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef2f8;--bg2:#ffffff;--bg3:#dce6f2;
  --border:rgba(60,90,160,0.12);--border2:rgba(60,90,160,0.22);
  --text:#0f1f3d;--text2:#3a5280;--text3:#6a85b0;
  --accent:#1a56a0;--accent2:#2a72cc;
  --accent-bg:rgba(26,86,160,0.08);--accent-border:rgba(26,86,160,0.25);
  --success:#2d7a4f;--success-bg:rgba(45,122,79,0.08);
  --warn:#b08020;--warn-bg:rgba(176,128,32,0.08);
  --danger:#c0392b;--danger-bg:rgba(192,57,43,0.08);
  --radius:10px;--radius-sm:6px;--radius-lg:14px;
  --shadow:0 4px 24px rgba(26,86,160,0.12);
  --font:'DM Sans',sans-serif;--display:'Playfair Display',serif;--mono:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231a56a0' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none;z-index:0}
#app{position:relative;z-index:1;min-height:100vh}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:500;border:1px solid var(--border2);background:var(--bg2);color:var(--text);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn:hover{background:var(--bg3)}
.btn.primary{background:var(--accent);color:#fff;border-color:transparent;font-weight:600}
.btn.primary:hover{background:var(--accent2)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--text2)}
.btn.ghost:hover{background:var(--bg3);color:var(--text)}
.btn.danger{color:var(--danger);border-color:rgba(192,57,43,0.2)}
.btn.danger:hover{background:var(--danger-bg)}
.btn.sm{padding:4px 10px;font-size:12px}
.header{background:rgba(238,242,248,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 24px}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:14px;height:62px}
.logo{font-family:var(--display);font-size:20px;font-weight:700;color:var(--accent);flex:1}
.logo span{font-size:12px;font-weight:400;color:var(--text3);font-family:var(--font);display:block;margin-top:-2px}
input.search{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 12px;font-size:13px;color:var(--text);font-family:var(--font);outline:none;width:200px;transition:border-color 0.15s}
input.search:focus{border-color:var(--accent);background:var(--bg2)}
input.search::placeholder{color:var(--text3)}
.main{max-width:1100px;margin:0 auto;padding:28px 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(26,86,160,0.06)}
.card:hover{border-color:var(--accent-border);transform:translateY(-2px);box-shadow:var(--shadow)}
.card-stripe{height:3px}
.card-body{padding:16px}
.card-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.avatar{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:14px;font-weight:700;flex-shrink:0}
.card-title{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-method{font-size:11px;color:var(--text3);margin-top:2px}
.card-brief{font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:38px}
.card-stats{display:flex;gap:6px;flex-wrap:wrap}
.stat{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.progress{height:3px;background:var(--bg3);border-radius:2px;margin-top:12px}
.progress-fill{height:100%;border-radius:2px;transition:width 0.4s}
.detail-header{background:rgba(238,242,248,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 24px}
.detail-header-inner{max-width:900px;margin:0 auto;padding:16px 0 0}
.detail-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.brief-bar{font-size:12px;color:var(--text2);padding:10px 14px;background:var(--bg3);border-radius:var(--radius-sm);margin-bottom:14px;border-left:3px solid var(--accent);line-height:1.6}
.tabs{display:flex;gap:0}
.tab{padding:8px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text3);font-size:13px;font-weight:400;cursor:pointer;transition:all 0.15s;font-family:var(--font);white-space:nowrap}
.tab.active{color:var(--text);font-weight:600}
.detail-main{max-width:900px;margin:0 auto;padding:24px}
.form-row{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
input,textarea,select{font-family:var(--font);font-size:13px;background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 12px;outline:none;width:100%;transition:border-color 0.15s}
input:focus,textarea:focus,select:focus{border-color:var(--accent);background:var(--bg2)}
textarea{resize:vertical;line-height:1.6;min-height:80px}
select option{background:var(--bg2)}
input::placeholder,textarea::placeholder{color:var(--text3)}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.overlay{position:fixed;inset:0;background:rgba(15,31,61,0.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal h2{font-family:var(--display);font-size:18px;font-weight:600;margin-bottom:20px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.color-opts{display:flex;gap:8px;margin-top:4px}
.color-dot{width:28px;height:28px;border-radius:7px;cursor:pointer;border:2px solid transparent;transition:all 0.15s}
.item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px}
.item-body{display:flex;align-items:flex-start;gap:10px;padding:12px 14px}
.check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;font-size:11px;font-weight:700;transition:all 0.15s}
.check.done{background:var(--success-bg);border-color:var(--success);color:var(--success)}
.item-content{flex:1;min-width:0}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.04em}
.badge.urgent{background:rgba(192,57,43,0.1);color:var(--danger)}
.badge.normal{background:var(--accent-bg);color:var(--accent)}
.badge.low{background:var(--bg3);color:var(--text3)}
.badge.pinned{background:var(--warn-bg);color:var(--warn)}
.badge.success{background:var(--success-bg);color:var(--success)}
.comments-section{border-top:1px solid var(--border);padding:12px 14px;background:var(--bg)}
.comment{font-size:12px;padding:7px 10px;background:var(--bg2);border-radius:6px;margin-bottom:6px;border-left:2px solid var(--accent)}
.finance-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.fin-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty .icon{font-size:40px;margin-bottom:12px}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);background:transparent;color:var(--text3);transition:all 0.15s}
.filter.active{background:var(--accent);color:#fff;border-color:transparent}
.section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;margin-top:20px}
.add-form{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.toolbar{display:flex;align-items:center;justify-content:flex-end;margin-bottom:16px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn 0.2s ease}

.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:40px;width:100%;max-width:380px;box-shadow:var(--shadow)}
.login-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:20px;font-weight:700;color:#fff;margin:0 auto 24px;box-shadow:0 8px 24px rgba(26,86,160,0.3)}
.login-title{font-family:var(--display);font-size:22px;font-weight:700;text-align:center;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px}
.login-error{font-size:12px;color:var(--danger);background:var(--danger-bg);padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:14px;text-align:center;display:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:10px}
@media(max-width:600px){.grid{grid-template-columns:1fr}.form-2{grid-template-columns:1fr}.finance-summary{grid-template-columns:1fr}.detail-top{flex-wrap:wrap}input.search{width:120px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Firebase Config ──────────────────────────────
const FB_CONFIG = {
  apiKey:"AIzaSyDbc4XZuKEOOCPypTjQFLpLXIUKJjqOS0U",
  authDomain:"accountant-workspace-40e9f.firebaseapp.com",
  projectId:"accountant-workspace-40e9f",
  storageBucket:"accountant-workspace-40e9f.firebasestorage.app",
  messagingSenderId:"360136146801",
  appId:"1:360136146801:web:e257b9fe9c71f0bc2280d0"
};
// ─────────────────────────────────────────────────

const COLORS=[
  {id:'sky',bg:'rgba(26,86,160,0.1)',border:'rgba(26,86,160,0.35)',text:'#1a56a0'},
  {id:'teal',bg:'rgba(45,122,79,0.1)',border:'rgba(45,122,79,0.35)',text:'#2d7a4f'},
  {id:'violet',bg:'rgba(100,60,160,0.1)',border:'rgba(100,60,160,0.35)',text:'#643ca0'},
  {id:'amber',bg:'rgba(176,128,32,0.1)',border:'rgba(176,128,32,0.35)',text:'#b08020'},
  {id:'coral',bg:'rgba(192,57,43,0.1)',border:'rgba(192,57,43,0.35)',text:'#c0392b'},
  {id:'slate',bg:'rgba(70,100,140,0.1)',border:'rgba(70,100,140,0.35)',text:'#46648c'},
];
const METHODS=['Accrual Basis','Cash Basis','Modified Cash Basis','Tax Basis','IFRS','US GAAP','Other'];
const PRIORITIES=['urgent','normal','low'];
const PLABELS={urgent:'🔴 Urgent',normal:'🔵 Normal',low:'⚪ Low'};
const MEET_TYPES=['Meeting','Call','Email Thread','Site Visit','Other'];
const MEET_ICONS={Meeting:'🤝',Call:'📞','Email Thread':'📧','Site Visit':'🏢',Other:'📋'};
const FIN_TYPES=['Invoice','Payment','Expense','Other'];
const FIN_STATUS=['Pending','Paid','Overdue','Partial'];
const UPD_TYPES=['General','Progress','Issue','Decision','Reminder'];
const UPD_ICONS={General:'📝',Progress:'📈',Issue:'⚠️',Decision:'✅',Reminder:'🔔'};

function getCol(id){return COLORS.find(c=>c.id===id)||COLORS[0];}
function ini(n){return(n||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function fmt(n){return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtD(d){return d?new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'}):'—';}
function today(){return new Date().toISOString().split('T')[0];}
function dueS(due,done){
  if(done||!due)return null;
  const diff=Math.ceil((new Date(due)-new Date())/86400000);
  if(diff<0)return{label:`${Math.abs(diff)}d overdue`,c:'var(--danger)',bg:'var(--danger-bg)'};
  if(diff===0)return{label:'Due today',c:'var(--warn)',bg:'var(--warn-bg)'};
  if(diff<=3)return{label:`${diff}d left`,c:'var(--warn)',bg:'var(--warn-bg)'};
  return{label:fmtD(due),c:'var(--text3)',bg:'var(--bg3)'};
}
function sid(){return String(Date.now()+Math.random());}

// ── State ──
let companies=[], sel=null, tab='tasks';
let showCModal=false, editC=null, selColor='sky';
let showTForm=false, tPrio='normal', expTask=null;
let showNForm=false, showFForm=false, showMForm=false, showUForm=false;
let taskFilter='all', delId=null, search='';

// ── Firebase (REST API - no SDK needed) ──
const BASE=`https://firestore.googleapis.com/v1/projects/${FB_CONFIG.projectId}/databases/(default)/documents`;
const KEY=`?key=${FB_CONFIG.apiKey}`;

function toFS(obj){
  // Convert JS object to Firestore format
  function conv(v){
    if(v===null||v===undefined)return{nullValue:null};
    if(typeof v==='boolean')return{booleanValue:v};
    if(typeof v==='number')return{doubleValue:v};
    if(typeof v==='string')return{stringValue:v};
    if(Array.isArray(v))return{arrayValue:{values:v.map(conv)}};
    if(typeof v==='object')return{mapValue:{fields:Object.fromEntries(Object.entries(v).map(([k,val])=>[k,conv(val)]))}};
    return{stringValue:String(v)};
  }
  return{fields:Object.fromEntries(Object.entries(obj).map(([k,v])=>[k,conv(v)]))};
}

function fromFS(doc){
  function parse(v){
    if('stringValue'in v)return v.stringValue;
    if('booleanValue'in v)return v.booleanValue;
    if('doubleValue'in v)return v.doubleValue;
    if('integerValue'in v)return Number(v.integerValue);
    if('nullValue'in v)return null;
    if('arrayValue'in v)return(v.arrayValue.values||[]).map(parse);
    if('mapValue'in v)return Object.fromEntries(Object.entries(v.mapValue.fields||{}).map(([k,val])=>[k,parse(val)]));
    return null;
  }
  const id=doc.name.split('/').pop();
  return{id,...Object.fromEntries(Object.entries(doc.fields||{}).map(([k,v])=>[k,parse(v)]))};
}

async function fsGet(col){
  const r=await fetch(`${BASE}/${col}${KEY}`);
  const d=await r.json();
  return(d.documents||[]).map(fromFS).sort((a,b)=>b.createdAt>a.createdAt?1:-1);
}

async function fsAdd(col,data){
  const r=await fetch(`${BASE}/${col}${KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(toFS({...data,createdAt:new Date().toISOString()}))});
  return fromFS(await r.json());
}

async function fsUpdate(col,id,data){
  const fields=Object.keys(data).map(k=>`updateMask.fieldPaths=${k}`).join('&');
  await fetch(`${BASE}/${col}/${id}?${fields}&key=${FB_CONFIG.apiKey}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(toFS(data))});
}

async function fsDel(col,id){
  await fetch(`${BASE}/${col}/${id}${KEY}`,{method:'DELETE'});
}

async function loadCompanies(){
  try{
    companies=await fsGet('companies');
    if(sel){const u=companies.find(c=>c.id===sel.id);if(u)sel=u;}
    render();
  }catch(e){
    document.getElementById('app').innerHTML=`<div style="text-align:center;padding:60px;color:var(--danger)"><div style="font-size:40px;margin-bottom:16px">⚠️</div><p style="font-size:16px;font-weight:600;margin-bottom:8px">Connection Error</p><p style="color:var(--text3);font-size:13px">Please check Firebase rules — set them to allow read/write</p><button class="btn primary" style="margin-top:16px" onclick="location.reload()">Retry</button></div>`;
  }
}

// ── Render ──
function render(){
  document.getElementById('app').innerHTML=sel?renderDetail():renderList();
}

// ── List ──
function renderList(){
  const f=companies.filter(c=>(c.name||'').toLowerCase().includes(search.toLowerCase())||(c.brief||'').toLowerCase().includes(search.toLowerCase()));
  return `
  <header class="header"><div class="header-inner">
    <div class="logo">BDC Workspace<span>${companies.length} ${companies.length===1?'company':'companies'}</span></div>
    <input class="search" placeholder="Search…" value="${search}" oninput="search=this.value;render()">
    <button class="btn primary" onclick="openCModal()">+ Add Company</button><button class="btn ghost" onclick="logout()" style="color:var(--text3)" title="Sign out">⎋ Sign out</button>
  </div></header>
  <div class="main">
    ${f.length===0?`<div class="empty"><div class="icon">🏢</div><p>${search?'No results.':'No companies yet.'}</p></div>`:`
    <div class="grid">${f.map(c=>{
      const col=getCol(c.color);
      const tasks=c.tasks||[];
      const done=tasks.filter(t=>t.done).length,total=tasks.length;
      const pct=total?Math.round(done/total*100):0;
      const overdue=tasks.filter(t=>!t.done&&t.due&&new Date(t.due)<new Date()).length;
      const pinned=(c.notes||[]).filter(n=>n.pinned&&!n.done).length;
      const dl=c.deadline?Math.ceil((new Date(c.deadline)-new Date())/86400000):null;
      return `<div class="card fade" onclick="selCompany('${c.id}')">
        <div class="card-stripe" style="background:${col.text}"></div>
        <div class="card-body">
          <div class="card-header">
            <div class="avatar" style="background:${col.bg};border:1px solid ${col.border};color:${col.text}">${ini(c.name)}</div>
            <div style="flex:1;min-width:0"><div class="card-title">${c.name||''}</div><div class="card-method">${c.method||''}</div></div>
            <div style="display:flex;gap:4px" onclick="event.stopPropagation()">
              <button class="btn ghost sm" onclick="openEditC('${c.id}')">✏️</button>
              <button class="btn ghost sm" onclick="delId='${c.id}';render()">🗑️</button>
            </div>
          </div>
          <div class="card-brief">${c.brief||'<span style="color:var(--text3);font-style:italic">No brief</span>'}</div>
          <div class="card-stats">
            ${total>0?`<span class="stat" style="background:${overdue>0?'var(--danger-bg)':'var(--success-bg)'};color:${overdue>0?'var(--danger)':'var(--success)'}">✅ ${done}/${total}${overdue>0?` · ${overdue} late`:''}</span>`:''}
            ${pinned>0?`<span class="stat" style="background:var(--warn-bg);color:var(--warn)">📌 ${pinned}</span>`:''}
            ${dl!==null?`<span class="stat" style="background:${dl<0?'var(--danger-bg)':dl<=7?'var(--warn-bg)':'var(--bg3)'};color:${dl<0?'var(--danger)':dl<=7?'var(--warn)':'var(--text3)'}">📅 ${dl<0?`${Math.abs(dl)}d late`:dl===0?'Today':`${dl}d`}</span>`:''}
          </div>
          ${total>0?`<div class="progress"><div class="progress-fill" style="width:${pct}%;background:${col.text};opacity:0.7"></div></div>`:''}
        </div>
      </div>`;
    }).join('')}</div>`}
  </div>
  ${renderCModal()}
  ${delId?`<div class="overlay" onclick="delId=null;render()"><div class="modal" onclick="event.stopPropagation()" style="max-width:360px">
    <h2>Delete company?</h2><p style="color:var(--text2);font-size:13px">All data will be permanently deleted.</p>
    <div class="modal-footer"><button class="btn" onclick="delId=null;render()">Cancel</button><button class="btn danger" onclick="doDelete()">Delete</button></div>
  </div></div>`:''}`;
}

// ── Detail ──
function renderDetail(){
  const c=sel, col=getCol(c.color);
  const dl=c.deadline?Math.ceil((new Date(c.deadline)-new Date())/86400000):null;
  const TABS={tasks:'✅ Tasks',notes:'📌 Notes',finances:'💰 Finances',meetings:'🗒️ Meetings',updates:'🔄 Updates'};
  return `
  <header class="detail-header"><div class="detail-header-inner">
    <div class="detail-top">
      <button class="btn ghost sm" onclick="sel=null;render()">← Back</button>

function switchTab(t){tab=t;showTForm=showNForm=showFForm=showMForm=showUForm=false;expTask=null;render();}

// ── Tasks ──
function renderTasks(){
  const c=sel,col=getCol(c.color),tasks=c.tasks||[];
  const counts={all:tasks.length,pending:tasks.filter(t=>!t.done).length,urgent:tasks.filter(t=>t.priority==='urgent'&&!t.done).length,done:tasks.filter(t=>t.done).length};
  const filtered=tasks.filter(t=>taskFilter==='done'?t.done:taskFilter==='pending'?!t.done:taskFilter==='urgent'?(t.priority==='urgent'&&!t.done):true);
  return `
  <div class="filters">
    ${['all','pending','urgent','done'].map(f=>`<button class="filter ${taskFilter===f?'active':''}" onclick="taskFilter='${f}';render()">${f.charAt(0).toUpperCase()+f.slice(1)} (${counts[f]})</button>`).join('')}
    <div style="flex:1"></div>
    <button class="btn primary" onclick="showTForm=!showTForm;render()">+ Add Task</button>
  </div>
  ${showTForm?`<div class="add-form fade">
    <div class="form-row"><input id="tText" placeholder="Task description…" onkeydown="if(event.key==='Enter')saveTask()"></div>
    <div class="form-2" style="margin-bottom:12px"><input id="tAssignee" placeholder="Assigned to…"><input id="tDue" type="date"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      ${PRIORITIES.map(p=>`<button class="filter ${tPrio===p?'active':''}" onclick="tPrio='${p}';render()">${PLABELS[p]}</button>`).join('')}
      <div style="flex:1"></div>
      <button class="btn sm" onclick="showTForm=false;render()">Cancel</button>
      <button class="btn primary sm" onclick="saveTask()">Add</button>
    </div>
  </div>`:''}
  ${filtered.length===0?`<div class="empty"><div class="icon">✅</div><p>No tasks.</p></div>`:''}
  ${filtered.map(task=>{
    const ds=dueS(task.due,task.done);
    const exp=String(expTask)===String(task.id);
    return `<div class="item fade" style="opacity:${task.done?0.65:1};border-color:${task.priority==='urgent'&&!task.done?'rgba(192,57,43,0.25)':'var(--border)'}">
      <div class="item-body">
        <div class="check ${task.done?'done':''}" onclick="toggleTask('${task.id}')">${task.done?'✓':''}</div>
        <div class="item-content">
          <div style="font-size:13px;font-weight:500;text-decoration:${task.done?'line-through':'none'};color:${task.done?'var(--text3)':'var(--text)'};margin-bottom:4px">${task.text}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
            <span class="badge ${task.priority}">${PLABELS[task.priority]}</span>
            ${task.assignee?`<span style="font-size:11px;color:var(--text3)">👤 ${task.assignee}</span>`:''}
            ${ds?`<span style="font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;background:${ds.bg};color:${ds.c}">${ds.label}</span>`:''}
            ${(task.comments||[]).length>0?`<span style="font-size:11px;color:var(--text3)">💬 ${task.comments.length}</span>`:''}
          </div>
        </div>
        <div style="display:flex;gap:4px">
          <button class="btn ghost sm" onclick="expTask=String(expTask)==='${task.id}'?null:'${task.id}';render()">${exp?'▲':'▼'}</button>
          <button class="btn ghost sm danger" onclick="removeTask('${task.id}')">✕</button>
        </div>
      </div>
      ${exp?`<div class="comments-section fade">
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Comments</div>
        ${(task.comments||[]).length===0?'<p style="font-size:12px;color:var(--text3);margin-bottom:8px">No comments yet.</p>':''}
        ${(task.comments||[]).map(cm=>`<div class="comment"><p style="color:var(--text);margin-bottom:2px">${cm.text}</p><span style="font-size:10px;color:var(--text3)">${new Date(cm.at).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</span></div>`).join('')}
        <div style="display:flex;gap:8px;margin-top:8px">
          <input id="cm_${task.id}" placeholder="Add a comment…" onkeydown="if(event.key==='Enter')addComment('${task.id}')">
          <button class="btn primary sm" onclick="addComment('${task.id}')">Add</button>
        </div>
      </div>`:''}
    </div>`;
  }).join('')}`;
}

// ── Notes ──
function renderNotes(){
  const notes=sel.notes||[];
  const pinned=notes.filter(n=>n.pinned&&!n.done);
  const active=notes.filter(n=>!n.pinned&&!n.done);
  const done=notes.filter(n=>n.done);
  const card=n=>`<div class="item fade" style="opacity:${n.done?0.55:1};border-color:${n.pinned?'rgba(176,128,32,0.3)':'var(--border)'}">
    <div class="item-body">
      <div style="flex:1">
        <p style="font-size:13px;line-height:1.7;text-decoration:${n.done?'line-through':'none'};margin-bottom:8px">${n.text}</p>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <span style="font-size:10px;color:var(--text3)">${fmtD(n.createdAt)}</span>
          ${n.pinned?'<span class="badge pinned">📌 Pinned</span>':''}
          ${n.done?'<span class="badge success">✅ Done</span>':''}
        </div>
      </div>
      <div style="display:flex;gap:4px;margin-left:8px">
        <button class="btn ghost sm" onclick="toggleNote('${n.id}','pinned')">${n.pinned?'📌':'📍'}</button>
        <button class="btn ghost sm" onclick="toggleNote('${n.id}','done')">${n.done?'↩️':'✅'}</button>
        <button class="btn ghost sm danger" onclick="removeNote('${n.id}')">✕</button>
      </div>
    </div>
  </div>`;
  return `
  <div class="toolbar"><button class="btn primary" onclick="showNForm=!showNForm;render()">+ Add Note</button></div>
  ${showNForm?`<div class="add-form fade">
    <div class="form-row"><textarea id="noteText" placeholder="Write your note…"></textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn sm" onclick="showNForm=false;render()">Cancel</button>
      <button class="btn primary sm" onclick="saveNote()">Save</button>
    </div>
  </div>`:''}
  ${notes.length===0&&!showNForm?`<div class="empty"><div class="icon">📌</div><p>No notes yet.</p></div>`:''}
  ${pinned.length>0?`<div class="section-label" style="color:var(--warn)">📌 Pinned</div>${pinned.map(card).join('')}`:''}
  ${active.length>0?`${pinned.length>0?'<div class="section-label">Notes</div>':''}${active.map(card).join('')}`:''}
  ${done.length>0?`<div class="section-label">✅ Completed</div>${done.map(card).join('')}`:''}`;
}

// ── Finances ──

  <div class="finance-summary">
    ${[{l:'Total Invoiced',v:inv,c:'var(--accent)'},{l:'Total Received',v:paid,c:'var(--success)'},{l:'Outstanding',v:out,c:out>0?'var(--warn)':'var(--text3)'}].map(s=>`
    <div class="fin-card"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">${s.l}</div><div style="font-size:20px;font-weight:600;font-family:var(--mono);color:${s.c}">$${fmt(s.v)}</div></div>`).join('')}

    <div class="form-2" style="margin-bottom:12px">
      <div><label class="form-label">Type</label><select id="fType">${FIN_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>

        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
          <span style="font-size:18px;font-weight:600;font-family:var(--mono);color:${f.type==='Payment'?'var(--success)':'var(--text)'}">${f.type==='Payment'?'+':''}$${fmt(f.amount)}</span>
          ${f.date?`<span style="font-size:11px;color:var(--text3)">${fmtD(f.date)}</span>`:''}

    <div class="form-row"><label class="form-label">Accounting Method</label><select id="cMethod">${METHODS.map(m=>`<option ${c?.method===m?'selected':''}>${m}</option>`).join('')}</select></div>
    <div class="form-row"><label class="form-label">Brief / Scope of Work</label><textarea id="cBrief" placeholder="What do we do for this company?">${c?.brief||''}</textarea></div>

function openCModal(){showCModal=true;editC=null;selColor='sky';render();}
function openEditC(id){showCModal=true;editC=companies.find(c=>c.id===id);selColor=editC?.color||'sky';render();}
function closeCModal(){showCModal=false;editC=null;render();}

// ── Actions ──
function selCompany(id){sel=companies.find(c=>c.id===id);tab='tasks';render();}

async function saveCo(){
  const name=document.getElementById('cName')?.value?.trim();
  if(!name)return;
  const data={name,method:document.getElementById('cMethod').value,brief:document.getElementById('cBrief').value.trim(),color:selColor,deadline:document.getElementById('cDl').value,driveLink:document.getElementById('cDrive').value.trim()};
  if(editC){
    await fsUpdate('companies',editC.id,data);
  }else{
    await fsAdd('companies',{...data,tasks:[],notes:[],finances:[],meetings:[],updates:[]});
  }
  showCModal=false;editC=null;
  await loadCompanies();
}

async function doDelete(){
  if(delId){await fsDel('companies',delId);if(sel?.id===delId)sel=null;delId=null;await loadCompanies();}
}

async function updateSel(field,value){
  await fsUpdate('companies',sel.id,{[field]:value});
  sel={...sel,[field]:value};
  render();
}

async function toggleTask(id){
  const tasks=(sel.tasks||[]).map(t=>String(t.id)===String(id)?{...t,done:!t.done}:t);
  await updateSel('tasks',tasks);
}
async function removeTask(id){
  await updateSel('tasks',(sel.tasks||[]).filter(t=>String(t.id)!==String(id)));
}
async function saveTask(){
  const text=document.getElementById('tText')?.value?.trim();
  if(!text)return;
  const task={id:sid(),text,assignee:document.getElementById('tAssignee')?.value?.trim()||'',due:document.getElementById('tDue')?.value||'',priority:tPrio,done:false,comments:[],createdAt:new Date().toISOString()};
  await updateSel('tasks',[task,...(sel.tasks||[])]);
  showTForm=false;tPrio='normal';
}
async function addComment(taskId){
  const el=document.getElementById('cm_'+taskId);
  const text=el?.value?.trim();if(!text)return;
  const tasks=(sel.tasks||[]).map(t=>String(t.id)===String(taskId)?{...t,comments:[...(t.comments||[]),{id:sid(),text,at:new Date().toISOString()}]}:t);
  await updateSel('tasks',tasks);
}

async function toggleNote(id,field){
  const notes=(sel.notes||[]).map(n=>String(n.id)===String(id)?{...n,[field]:!n[field]}:n);
  await updateSel('notes',notes);
}
async function removeNote(id){await updateSel('notes',(sel.notes||[]).filter(n=>String(n.id)!==String(id)));}
async function saveNote(){
  const text=document.getElementById('noteText')?.value?.trim();if(!text)return;
  await updateSel('notes',[{id:sid(),text,pinned:false,done:false,createdAt:new Date().toISOString()},...(sel.notes||[])]);
  showNForm=false;
}

async function saveFin(){
  const desc=document.getElementById('fDesc')?.value?.trim(),amt=document.getElementById('fAmt')?.value;
  if(!desc||!amt)return;
  const entry={id:sid(),type:document.getElementById('fType').value,status:document.getElementById('fStatus').value,description:desc,amount:Number(amt),date:document.getElementById('fDate').value,notes:document.getElementById('fNotes')?.value?.trim()||'',createdAt:new Date().toISOString()};
  await updateSel('finances',[entry,...(sel.finances||[])]);
  showFForm=false;
}
async function removeFin(id){await updateSel('finances',(sel.finances||[]).filter(f=>String(f.id)!==String(id)));}

async function saveMeet(){
  const title=document.getElementById('mTitle')?.value?.trim();if(!title)return;

  await updateSel('meetings',[m,...(sel.meetings||[])]);
  showMForm=false;
}
async function removeMeet(id){await updateSel('meetings',(sel.meetings||[]).filter(m=>String(m.id)!==String(id)));}

async function saveUpdate(){

  const u={id:sid(),type:document.getElementById('uType').value,title,date:document.getElementById('uDate').value,details:document.getElementById('uDetails')?.value?.trim()||'',createdAt:new Date().toISOString()};

async function removeUpdate(id){await updateSel('updates',(sel.updates||[]).filter(u=>String(u.id)!==String(id)));}


// ── Login ──────────────────────────────────────
const USERS = [
  { username: 'Lara', password: '@1@2@3' }
  // Add more users here if needed:
  // { username: 'lara', password: 'yourpassword' }
];

let loggedIn = sessionStorage.getItem('bdc_auth') === 'true';

function renderLogin(error=''){
  document.getElementById('app').innerHTML = `
  <div class="login-screen">
    <div class="login-box">
      <div class="login-logo">BDC</div>
      <div class="login-title">BDC Workspace</div>
      <div class="login-sub">Business Development Center</div>
      ${error?`<div class="login-error" style="display:block">${error}</div>`:''}
      <div class="form-row"><label class="form-label">Username</label><input id="lUser" placeholder="Enter username" onkeydown="if(event.key==='Enter')document.getElementById('lPass').focus()"></div>
      <div class="form-row"><label class="form-label">Password</label><input id="lPass" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn primary" style="width:100%;justify-content:center;padding:10px;font-size:14px;margin-top:8px" onclick="doLogin()">Sign In</button>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById('lUser')?.focus(),100);
}

function doLogin(){
  const u=document.getElementById('lUser')?.value?.trim();
  const p=document.getElementById('lPass')?.value;
  const match=USERS.find(x=>x.username===u&&x.password===p);
  if(match){
    sessionStorage.setItem('bdc_auth','true');
    loggedIn=true;
    loadCompanies();
  } else {
    renderLogin('Incorrect username or password.');
  }
}

function logout(){
  sessionStorage.removeItem('bdc_auth');
  loggedIn=false;
  renderLogin();
}

if(loggedIn){ 
  document.getElementById('app').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px"><div style="width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:20px;font-weight:700;color:#fff;box-shadow:0 8px 24px rgba(26,86,160,0.3)">BDC</div><p style="color:var(--text3);font-size:13px">Loading workspace…</p></div>`;
  loadCompanies();
} else {
  renderLogin();
}
